# ═══════════════════════════════════════════════════════════════════════════
# CorticalFields — BrainNet backend conda environment
# ═══════════════════════════════════════════════════════════════════════════
#
# This environment provides all dependencies for the BrainNet cortical
# surface reconstruction backend (SimNIBS + BrainNet). BrainNet requires
# specific PyTorch + CUDA + Kaolin versions that may conflict with your
# base CorticalFields environment, so we isolate it here.
#
# Usage:
#   conda env create -f env/conda_brainnet.yml
#   conda activate cf-brainnet
#   # Then in Python:
#   from corticalfields.pointcloud import from_t1w
#   result = from_t1w("sub-01_T1w.nii.gz", backend="brainnet")
#
# GPU requirements:
#   - NVIDIA GPU with CUDA 12.4 support
#   - At least 6 GB VRAM recommended
#   - CPU fallback is available (slower, ~minutes vs ~1s on GPU)
#
# References:
#   Nielsen et al. (2025). End-to-end Cortical Surface Reconstruction
#   from Clinical MRI. MLMI/MICCAI. arXiv:2505.14017.
# ═══════════════════════════════════════════════════════════════════════════

name: cf-brainnet
channels:
  - conda-forge
  - nvidia
  - pytorch
  - defaults

dependencies:
  # ── Python core ────────────────────────────────────────────────────────
  - python=3.11
  - pip

  # ── CUDA toolkit (needed to build BrainNet's custom CUDA extensions) ──
  - cudatoolkit-dev=12.4

  # ── Scientific stack ───────────────────────────────────────────────────
  - numpy>=1.24
  - scipy>=1.11
  - nibabel>=5.0
  - matplotlib>=3.7

  # ── pip-only packages ──────────────────────────────────────────────────
  - pip:
    # PyTorch 2.6.0 with CUDA 12.4
    - torch==2.6.0
    - torchvision==0.21.0

    # NVIDIA Kaolin (3D deep learning, required by BrainNet)
    # The wheel URL is version-specific — update if torch version changes
    - kaolin==0.18.0

    # BrainNet (install from source)
    - git+https://github.com/simnibs/brainnet.git

    # CorticalFields itself
    - corticalfields

    # Core CorticalFields dependencies
    - robust-laplacian
    - scikit-image
    - pyvista
